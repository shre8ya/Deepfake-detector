<!DOCTYPE html>
<html>
<head>
    <title>Deepfake Detector</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background: #111;
            color: white;
        }

        .box {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
        }

        button {
            padding: 10px 20px;
            background: #00c3ff;
            border: none;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        input {
            margin: 10px;
        }

        .result {
            margin-top: 20px;
            font-size: 24px;
        }

        .fake { color: red; }
        .real { color: lime; }
    </style>
</head>
<body>

    <div class="box">
        <h1>Deepfake Detector</h1>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <br>
            <button type="submit">Analyze</button>
        </form>

        {% if result %}
            <div class="result">
                Result:
                <span class="{{ 'fake' if result.label == 'FAKE' else 'real' }}">
                    {{ result.label }}
                </span>
                <br>
                Confidence: {{ result.confidence }}
            </div>
        {% endif %}
    </div>

</body>
</html>
